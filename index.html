<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- viewport-fit=cover + no user-scaling: full-bleed canvas, no pinch/double-tap zoom in the app shell -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>GeoMaker — pattern studio</title>
  <meta name="description" content="GeoMaker: a generative-art pattern studio. Organic, geometric, fractal and traditional patterns you shape with live sliders — all on-device.">
  <meta name="theme-color" content="#0b0e14">
  <!-- iOS standalone / Capacitor web view -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GeoMaker">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12' fill='none' stroke='%2345d4a8' stroke-width='3'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%2345d4a8'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="art"></canvas>
  <canvas id="fx" aria-hidden="true"></canvas>

  <button id="show-ui" title="Show controls (H)" hidden>☰</button>

  <aside id="panel">
    <header class="panel-header">
      <div>
        <h1>GEO<span>MAKER</span></h1>
        <p class="tagline">organic pattern studio</p>
      </div>
      <button id="hide-ui" title="Hide controls (H)">✕</button>
    </header>

    <div class="actions">
      <button id="btn-shuffle" class="primary" title="New seed + palette (Space)">🎲 Surprise me</button>
      <button id="btn-regen" title="Replay with current settings (R)">↺</button>
      <button id="btn-play" title="Pause (P)">⏸</button>
      <button id="btn-save" title="Download PNG (S)">⬇</button>
      <button id="btn-link" title="Copy share link (C)">🔗</button>
    </div>

    <section class="group">
      <div class="control">
        <label class="control-label" for="algo-select">Algorithm</label>
        <select id="algo-select"></select>
      </div>
      <p id="algo-desc" class="desc"></p>
      <p id="algo-hint" class="hint" hidden></p>
      <div class="control">
        <label class="control-label" for="seed-input">Seed</label>
        <div class="seed-wrap">
          <input id="seed-input" type="text" spellcheck="false" autocomplete="off">
          <button id="seed-dice" title="Random seed">🎲</button>
        </div>
      </div>
      <div class="control">
        <label class="control-label" for="palette-select">Palette</label>
        <select id="palette-select"></select>
        <div id="swatches"></div>
      </div>
    </section>

    <section class="group">
      <h2>Look</h2>
      <div id="look-controls"></div>
    </section>

    <section class="group">
      <h2>Tuning</h2>
      <div id="param-controls"></div>
    </section>

    <footer class="panel-footer">
      <p>
        <kbd>space</kbd> surprise · <kbd>r</kbd> replay · <kbd>p</kbd> pause<br>
        <kbd>s</kbd> save png · <kbd>c</kbd> copy link · <kbd>h</kbd> hide ui
      </p>
    </footer>
  </aside>

  <div id="toast" hidden></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
